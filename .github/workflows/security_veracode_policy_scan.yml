name: Security veracode policy scan
on:
  workflow_dispatch:
  schedule:
    - cron: "36 8 * * 1" # Every Monday at 08:36 UTC
jobs:
  security-veracode-policy-check:
    name: Project security veracode policy scan
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_policy_scan.yml@v2 # WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      # hmpps-ems-cemo-notifications
      # need to set Slack channel up to get alerts
    secrets: inherit
